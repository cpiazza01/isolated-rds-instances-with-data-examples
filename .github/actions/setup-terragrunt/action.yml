name: Set up Terragrunt
description: Downloads, verifies, and installs the pinned Terragrunt binary onto PATH.

inputs:
  version:
    description: Terragrunt version to install (e.g. "0.67.0")
    required: true

runs:
  using: composite
  steps:
    - name: Download, verify, and install Terragrunt
      shell: bash
      run: |
        # Download to /tmp so the binary and SHA256SUMS file share a directory —
        # sha256sum --check resolves filenames relative to the current directory.
        cd /tmp
        curl -sL -o terragrunt_linux_amd64 \
          "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.version }}/terragrunt_linux_amd64"
        # Verify the binary matches the published checksum before placing it on PATH.
        curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.version }}/SHA256SUMS" \
          | grep "terragrunt_linux_amd64" | sha256sum --check
        # install -m 0755 copies the file and sets the execute bit in one step.
        install -m 0755 terragrunt_linux_amd64 /usr/local/bin/terragrunt
