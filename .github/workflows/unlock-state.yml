name: Unlock State

# Releases a stuck DynamoDB state lock. Pass the lock ID shown in the
# Terraform error message along with the affected module, environment, and region.
#
# Required GitHub Actions variables (Settings → Secrets and variables → Variables):
#   AWS_ROLE_ARN  — set at repo level AND in each GitHub Environment
#                   (per-environment role ARNs from bootstrap outputs)
#
# No GitHub Actions secrets required.

on:
  workflow_dispatch:
    inputs:
      lock_id:
        description: "Lock ID from the Terraform error message"
        required: true
        type: string
      module:
        description: "Module"
        required: true
        type: choice
        options:
          - mysql
          - postgres
          - postgres-vpn
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      region:
        description: "AWS region"
        required: true
        type: choice
        options:
          - us-east-1

# Prevent two unlock attempts on the same target at the same time.
# cancel-in-progress: false so an in-flight unlock is never interrupted.
concurrency:
  group: unlock-state-${{ inputs.environment }}-${{ inputs.module }}-${{ inputs.region }}
  cancel-in-progress: false

permissions:
  id-token: write   # required to exchange the GitHub OIDC token for AWS credentials
  contents: read

env:
  TERRAGRUNT_VERSION: "0.67.0"

jobs:
  # ---------------------------------------------------------------------------
  # Unlock — runs terragrunt force-unlock with the provided lock ID.
  # The environment key ensures the correct AWS role is assumed, and prod
  # reviewer protection applies when prod is selected.
  # ---------------------------------------------------------------------------
  unlock:
    name: "Unlock → ${{ inputs.environment }} (${{ inputs.module }}/${{ inputs.region }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Set up Terragrunt
        uses: ./.github/actions/setup-terragrunt
        with:
          version: ${{ env.TERRAGRUNT_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Terragrunt force-unlock
        working-directory: module/${{ inputs.module }}/environments/${{ inputs.environment }}/${{ inputs.region }}
        env:
          TF_LOG: ERROR
          TF_LOG_PATH: /tmp/tf.log
          LOCK_ID: ${{ inputs.lock_id }}
        run: |
          # -force bypasses Terraform's interactive "Do you really want to unlock?" prompt,
          # which is required for non-interactive CI execution.
          # LOCK_ID is passed via env var rather than inline expression to prevent shell injection.
          terragrunt force-unlock -force "$LOCK_ID" --terragrunt-non-interactive

      - name: Show Terraform error log
        if: failure()
        run: cat /tmp/tf.log 2>/dev/null || echo "No Terraform log written"
