name: Unlock State

# Releases a stuck DynamoDB state lock. Pass the lock ID shown in the
# Terraform error message along with the affected module, environment, and region.
#
# Required GitHub Actions variables (Settings → Secrets and variables → Variables):
#   AWS_ROLE_ARN  — set at repo level AND in each GitHub Environment
#                   (per-environment role ARNs from bootstrap outputs)
#
# No GitHub Actions secrets required.

on:
  workflow_dispatch:
    inputs:
      lock_id:
        description: "Lock ID from the Terraform error message"
        required: true
        type: string
      module:
        description: "Module"
        required: true
        type: choice
        options:
          - postgres
          - mysql
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      region:
        description: "AWS region"
        required: true
        type: choice
        options:
          - us-east-1

# Prevent two unlock attempts on the same target at the same time.
# cancel-in-progress: false so an in-flight unlock is never interrupted.
concurrency:
  group: unlock-state-${{ inputs.environment }}-${{ inputs.module }}-${{ inputs.region }}
  cancel-in-progress: false

permissions:
  id-token: write   # required to exchange the GitHub OIDC token for AWS credentials
  contents: read

env:
  TERRAGRUNT_VERSION: "0.67.0"

jobs:
  # ---------------------------------------------------------------------------
  # Unlock — runs terragrunt force-unlock with the provided lock ID.
  # The environment key ensures the correct AWS role is assumed, and prod
  # reviewer protection applies when prod is selected.
  # ---------------------------------------------------------------------------
  unlock:
    name: "Unlock → ${{ inputs.environment }} (${{ inputs.module }}/${{ inputs.region }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Set up Terragrunt
        run: |
          # Download to /tmp so the binary and SHA256SUMS file share a directory —
          # sha256sum --check resolves filenames relative to the current directory.
          cd /tmp
          curl -sL -o terragrunt_linux_amd64 \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64"
          # Verify the binary matches the published checksum before placing it on PATH.
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/SHA256SUMS" \
            | grep "terragrunt_linux_amd64" | sha256sum --check
          # install -m 0755 copies the file and sets the execute bit in one step.
          install -m 0755 terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Terragrunt force-unlock
        working-directory: module/${{ inputs.module }}/environments/${{ inputs.environment }}/${{ inputs.region }}
        run: terragrunt force-unlock -force "${{ inputs.lock_id }}" --terragrunt-non-interactive
