name: CI

# Promotion pipeline:
#   PR to main          → test + plan test  (previews exactly what merging will deploy)
#   Push to feature     → test → deploy dev  (apply runs its own plan internally)
#   Push to main        → test → deploy test  (apply runs its own plan internally)
#   Prod                → deploy-prod.yml (manual dispatch, main branch only)
#
# Required GitHub Actions variables (Settings → Secrets and variables → Variables):
#   AWS_ROLE_ARN         — IAM role ARN to assume via OIDC (not a secret — ARNs are
#                          identifiers, not credentials; OIDC conditions enforce access)
#                          Set at repo level (dev role) AND in each GitHub Environment
#                          (dev / test / prod role ARNs from bootstrap outputs)
#
# No GitHub Actions secrets required.

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

# Cancel any in-progress run for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write   # required to exchange the GitHub OIDC token for AWS credentials
  contents: read

env:
  TERRAGRUNT_VERSION: "0.67.0"

jobs:
  # ---------------------------------------------------------------------------
  # Detect changed modules — any file change under module/<name>/ triggers that
  # module for all its regions. Outputs:
  #   deployments     JSON array of {module, region} pairs for plan/deploy jobs
  #   changed_modules JSON array of module names for the test matrix
  #   any_changed     boolean gate used by downstream jobs
  #   target_env      dev (feature branch / PR) or test (push/PR to main)
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect changed deployments
    runs-on: ubuntu-latest
    outputs:
      deployments: ${{ steps.detect.outputs.deployments }}
      changed_modules: ${{ steps.detect.outputs.changed_modules }}
      any_changed: ${{ steps.detect.outputs.any_changed }}
      target_env: ${{ steps.detect.outputs.target_env }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find affected module/region pairs
        id: detect
        run: |
          # Build the set of changed files. Strategy depends on the event type:
          #
          # pull_request: three-dot diff from the merge base of the base branch and
          #   HEAD. Three-dot syntax means commits merged into main after this PR was
          #   opened don't appear as "changed" in the PR's diff.
          #
          # push (existing branch): github.event.before is the SHA that HEAD pointed
          #   to before the push started. Two-dot diff captures every commit in the
          #   push, not just the last one (HEAD~1 would silently skip earlier ones).
          #   Two dots (not three) is correct here: three-dot finds the merge base,
          #   which on a non-linear push can predate event.before and miss changes.
          #
          # push (new branch): github.event.before is all zeros — there is no "before"
          #   SHA. Fall back to listing every file in the HEAD commit tree so all
          #   modules are treated as changed on the first push to a new branch.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            changed=$(git diff --name-only "${{ github.event.before }}..HEAD")
          else
            changed=$(git diff-tree --no-commit-id -r --name-only HEAD)
          fi

          # Target env: test on push to main OR PR to main (so plan previews what
          # the merge will actually deploy); dev for all other branches/PRs.
          target_env="dev"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            target_env="test"
          elif [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.base_ref }}" = "main" ]; then
            target_env="test"
          fi
          echo "target_env=${target_env}" >> "$GITHUB_OUTPUT"

          # For each non-bootstrap module, check whether any file under its directory
          # changed. If yes, queue all of its regions for deployment.
          # -mindepth 2 -maxdepth 2 targets exactly the <env>/<region> directories
          # beneath each module's environments/ (e.g. environments/dev/us-east-1).
          pairs=()

          # root.terragrunt.hcl is the shared backend + provider config inherited by
          # every leaf. A change to it affects all modules and all regions.
          if echo "$changed" | grep -q "^root\.terragrunt\.hcl$"; then
            for mod_dir in module/*/; do
              mod=$(basename "$mod_dir")
              [[ "$mod" == "bootstrap" ]] && continue
              while IFS= read -r region_dir; do
                pairs+=("$mod:$(basename "$region_dir")")
              done < <(find "module/$mod/environments" -mindepth 2 -maxdepth 2 -type d 2>/dev/null)
            done
          fi

          for mod_dir in module/*/; do
            mod=$(basename "$mod_dir")
            [[ "$mod" == "bootstrap" ]] && continue
            if echo "$changed" | grep -q "^module/$mod/"; then
              while IFS= read -r region_dir; do
                pairs+=("$mod:$(basename "$region_dir")")
              done < <(find "module/$mod/environments" -mindepth 2 -maxdepth 2 -type d 2>/dev/null)
            fi
          done

          if [ ${#pairs[@]} -eq 0 ]; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
            echo "deployments=[]" >> "$GITHUB_OUTPUT"
            echo "changed_modules=[]" >> "$GITHUB_OUTPUT"
          else
            # Deduplicate pairs — find yields one entry per env (dev/us-east-1,
            # test/us-east-1, prod/us-east-1) but the deploy jobs target a single
            # env, so only unique module:region pairs are needed.
            unique_pairs=()
            for pair in "${pairs[@]}"; do
              if [[ ! " ${unique_pairs[*]} " =~ " $pair " ]]; then
                unique_pairs+=("$pair")
              fi
            done

            # jq -R reads each "module:region" line as a raw string; split(":") yields
            # the two fields; jq -s -c slurps all objects into a single compact array.
            json=$(printf '%s\n' "${unique_pairs[@]}" | \
              jq -R 'split(":") | {"module": .[0], "region": .[1]}' | \
              jq -s -c .)
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            echo "deployments=$json" >> "$GITHUB_OUTPUT"

            # Deduplicate module names for the test matrix.
            # ${pair%%:*} strips from the first ":" to the end, leaving the module name.
            modules=()
            for pair in "${unique_pairs[@]}"; do
              mod="${pair%%:*}"
              if [[ ! " ${modules[*]} " =~ " $mod " ]]; then
                modules+=("$mod")
              fi
            done
            modules_json=$(printf '%s\n' "${modules[@]}" | jq -R . | jq -s -c .)
            echo "changed_modules=$modules_json" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Test — plan-only tests using mock providers. No AWS credentials required.
  # Runs only for the modules that changed. Plan and deploy jobs are gated on
  # this passing.
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.module }})
    needs: [detect-changes]
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.changed_modules) }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform fmt check
        working-directory: module/${{ matrix.module }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: module/${{ matrix.module }}
        run: terraform init

      - name: Terraform validate
        working-directory: module/${{ matrix.module }}
        run: terraform validate

      - name: Terraform test
        working-directory: module/${{ matrix.module }}
        run: terraform test

  # ---------------------------------------------------------------------------
  # Plan — runs on PRs only to show reviewers what will change before merge.
  # Skipped on pushes since apply runs its own plan internally.
  # ---------------------------------------------------------------------------
  plan:
    name: Plan → ${{ needs.detect-changes.outputs.target_env }} (${{ matrix.deployment.module }}/${{ matrix.deployment.region }})
    needs: [detect-changes, test]
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        deployment: ${{ fromJson(needs.detect-changes.outputs.deployments) }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false   # Terragrunt calls terraform directly; wrapper interferes

      - name: Set up Terragrunt
        run: |
          # Download to /tmp so the binary and SHA256SUMS file share a directory —
          # sha256sum --check resolves filenames relative to the current directory.
          cd /tmp
          curl -sL -o terragrunt_linux_amd64 \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64"
          # Verify the binary matches the published checksum before placing it on PATH.
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/SHA256SUMS" \
            | grep "terragrunt_linux_amd64" | sha256sum --check
          # install -m 0755 copies the file and sets the execute bit in one step.
          install -m 0755 terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.deployment.region }}

      - name: Terragrunt plan
        working-directory: module/${{ matrix.deployment.module }}/environments/${{ needs.detect-changes.outputs.target_env }}/${{ matrix.deployment.region }}
        run: terragrunt plan --terragrunt-non-interactive 2>&1

  # ---------------------------------------------------------------------------
  # Deploy → dev — push to any non-main branch, after tests pass.
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy → dev (${{ matrix.deployment.module }}/${{ matrix.deployment.region }})
    needs: [detect-changes, test]
    if: >
      github.event_name == 'push' &&
      github.ref != 'refs/heads/main' &&
      needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        deployment: ${{ fromJson(needs.detect-changes.outputs.deployments) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Set up Terragrunt
        run: |
          # Download to /tmp so the binary and SHA256SUMS file share a directory —
          # sha256sum --check resolves filenames relative to the current directory.
          cd /tmp
          curl -sL -o terragrunt_linux_amd64 \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64"
          # Verify the binary matches the published checksum before placing it on PATH.
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/SHA256SUMS" \
            | grep "terragrunt_linux_amd64" | sha256sum --check
          # install -m 0755 copies the file and sets the execute bit in one step.
          install -m 0755 terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.deployment.region }}

      - name: Terragrunt apply
        working-directory: module/${{ matrix.deployment.module }}/environments/dev/${{ matrix.deployment.region }}
        run: terragrunt apply -auto-approve --terragrunt-non-interactive 2>&1

  # ---------------------------------------------------------------------------
  # Deploy → test — push to main only, after tests pass.
  # ---------------------------------------------------------------------------
  deploy-test:
    name: Deploy → test (${{ matrix.deployment.module }}/${{ matrix.deployment.region }})
    needs: [detect-changes, test]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    environment: test
    strategy:
      fail-fast: false
      matrix:
        deployment: ${{ fromJson(needs.detect-changes.outputs.deployments) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Set up Terragrunt
        run: |
          # Download to /tmp so the binary and SHA256SUMS file share a directory —
          # sha256sum --check resolves filenames relative to the current directory.
          cd /tmp
          curl -sL -o terragrunt_linux_amd64 \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64"
          # Verify the binary matches the published checksum before placing it on PATH.
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/SHA256SUMS" \
            | grep "terragrunt_linux_amd64" | sha256sum --check
          # install -m 0755 copies the file and sets the execute bit in one step.
          install -m 0755 terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.deployment.region }}

      - name: Terragrunt apply
        working-directory: module/${{ matrix.deployment.module }}/environments/test/${{ matrix.deployment.region }}
        run: terragrunt apply -auto-approve --terragrunt-non-interactive 2>&1
